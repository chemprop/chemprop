name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

concurrency:
  group: actions-id-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  USE_LIBUV: 0

jobs:
  build:
    name: Check Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install build
      - run: python -m build .

  lint:
    name: Check Formatting
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install black==23.* flake8 isort
      - run: black --check .
      - run: flake8 .
      - run: isort --check .

  test:
    name: Execute Tests
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, windows-latest]
        python-version: [3.11, 3.12]
        exclude:
          - os: windows-latest
            python-version: 3.12
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true
          show-channel-urls: true
          conda-remove-defaults: true
          environment-file: environment.yml
          activate-environment: chemprop
      - name: Install PyTorch (Windows, conda CPU)
        if: matrix.os == 'windows-latest'
        shell: bash -l {0}
        run: |
          conda install -y -c pytorch -c conda-forge pytorch cpuonly
          python - <<'PY' > torch_version.txt
          import importlib.metadata as m
          print(m.version('torch'))
          PY
      - name: Install cuik-molmaker
        if: matrix.os == 'ubuntu-latest'
        shell: bash -l {0}
        run: |
          conda install -y rdkit==2025.3.2 pytorch==2.7.0 -c pytorch
          python chemprop/scripts/check_and_install_cuik_molmaker.py
      - name: Install
