name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

concurrency:
  group: actions-id-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  USE_LIBUV: 0

jobs:
  build:
    name: Check Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install build
      - run: python -m build .

  lint:
    name: Check Formatting
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install black==23.* flake8 isort
      - run: black --check .
      - run: flake8 .
      - run: isort --check .

  test:
    name: Execute Tests
    needs: lint
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, windows-latest]
        python-version: [3.11, 3.12]
        exclude:
          - os: windows-latest
            python-version: 3.12
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          auto-update-conda: true
          show-channel-urls: true
          conda-remove-defaults: true
          environment-file: environment.yml
          activate-environment: chemprop
      - name: Conda config (strict priority)
        shell: bash -l {0}
        run: conda config --set channel_priority strict
      - name: Install PyTorch (Windows, conda-forge CPU)
        if: matrix.os == 'windows-latest'
        shell: bash -l {0}
        env:
          CONDA_DLL_SEARCH_MODIFICATION_ENABLE: "1"
        run: |
          conda install -y -c conda-forge pytorch cpuonly
          python -c "import importlib.metadata as m; print(m.version('torch'))" > torch_version.txt
          conda list pytorch
      - name: Install cuik-molmaker
        if: matrix.os == 'ubuntu-latest'
        shell: bash -l {0}
        run: |
          conda install -y rdkit==2025.3.2 pytorch==2.7.0 -c pytorch
          python chemprop/scripts/check_and_install_cuik_molmaker.py
      - name: Install dependencies
        shell: bash -l {0}
        run: |
          python -m pip install nbmake
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "torch==$(cat torch_version.txt)" > constraints.txt
            python -m pip install --upgrade --upgrade-strategy only-if-needed -c constraints.txt ".[dev,docs,test,hpopt]"
          else
            python -m pip install ".[dev,docs,test,hpopt]"
          fi
      - name: Torch env check
        shell: bash -l {0}
        env:
          CONDA_DLL_SEARCH_MODIFICATION_ENABLE: "1"
        run: |
          conda info
          conda list | grep -Ei "pytorch|mkl|openmp|ucrt" || true
          python -c "import torch, os; print('Torch OK:', torch.__version__, 'from', torch.__file__); print('PATH head:', os.environ['PATH'].split(';')[:5])"
      - name: Test with pytest
        shell: bash -l {0}
        run: pytest -v tests
      - name: Test notebooks
        shell: bash -l {0}
        run: |
          python -m pip install matplotlib
          pytest --no-cov -v --nbmake $(find examples -name '*.ipynb' ! -name 'use_featurizer_with_other_libraries.ipynb' ! -name 'shapley_value_with_customized_featurizers.ipynb')
          pytest --no-cov -v --nbmake $(find docs/source/tutorial/python -name "*.ipynb")

  pypi:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'chemprop/chemprop' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pypa/build
        run: python -m pip install build --user
      - name: Build a binary wheel and a source tarball
        run: python -m build --sdist --wheel --outdir dist/ .
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'chemprop/chemprop' }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: chemprop/chemprop:latest
